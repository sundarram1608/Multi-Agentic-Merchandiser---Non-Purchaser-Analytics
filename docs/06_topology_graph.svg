<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1450" font-family="-apple-system, Segoe UI, Roboto, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafbfc"/>
      <stop offset="1" stop-color="#eef1f4"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1500" height="1450" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="750" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">
    Merchandising Chat — Topology Graph
  </text>
  <text x="750" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    Star topology · agents on left/right, tools below — every connection enters a different edge of the Orchestrator
  </text>

  <!-- =========================================================
       Connection lines (drawn FIRST so boxes overlay them)
       Layout strategy (no overlaps):
         - LEFT agents  → ORCHESTRATOR LEFT  edge  (4 lines at 4 distinct Y points)
         - RIGHT agents → ORCHESTRATOR RIGHT edge  (3 lines at 3 distinct Y points)
         - PLANNER      → ORCHESTRATOR TOP   edge  (single line at center top)
         - SUPERVISOR   → ORCHESTRATOR TOP-RIGHT corner  (dashed orange)
         - TOOLS        → ORCHESTRATOR BOTTOM edge  (single dashed green line)
       Each edge has its own connection points, so no two lines run on top
       of each other.
       ========================================================= -->

  <!-- LEFT agent connections (4 lines, distinct entry points on left edge) -->
  <line x1="330" y1="320" x2="610" y2="455" stroke="#475569" stroke-width="2"/>
  <line x1="330" y1="440" x2="610" y2="480" stroke="#475569" stroke-width="2"/>
  <line x1="330" y1="560" x2="610" y2="510" stroke="#475569" stroke-width="2"/>
  <line x1="330" y1="680" x2="610" y2="540" stroke="#475569" stroke-width="2"/>

  <!-- RIGHT agent connections (3 lines, distinct entry points on right edge) -->
  <line x1="1170" y1="320" x2="890" y2="460" stroke="#475569" stroke-width="2"/>
  <line x1="1170" y1="440" x2="890" y2="490" stroke="#475569" stroke-width="2"/>
  <line x1="1170" y1="560" x2="890" y2="520" stroke="#475569" stroke-width="2"/>

  <!-- Planner → Orchestrator (single line, top edge) -->
  <line x1="750" y1="180" x2="750" y2="440" stroke="#475569" stroke-width="2"/>

  <!-- Supervisor → Orchestrator (dashed orange, top-right corner) -->
  <line x1="1200" y1="180" x2="890" y2="445" stroke="#d97706" stroke-width="2" stroke-dasharray="7 4"/>

  <!-- Tools → Orchestrator (single dashed green line, bottom center) -->
  <line x1="750" y1="800" x2="750" y2="560" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 4"/>

  <!-- User/Chat → Planner (horizontal at top) -->
  <line x1="330" y1="145" x2="640" y2="145" stroke="#475569" stroke-width="2"/>

  <!-- =========================================================
       Nodes
       ========================================================= -->

  <!-- User / Chat -->
  <g transform="translate(170, 110)" filter="url(#softShadow)">
    <rect width="160" height="70" rx="12" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">User · Chat</text>
    <text x="80" y="52" text-anchor="middle" font-size="10" fill="#64748b">Streamlit interface</text>
  </g>

  <!-- Planner (top center) -->
  <g transform="translate(640, 110)" filter="url(#softShadow)">
    <rect width="220" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="110" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">1. Planner</text>
    <text x="110" y="52" text-anchor="middle" font-size="10" fill="#64748b">sql / direct / clarify</text>
  </g>

  <!-- Supervisor (top right) -->
  <g transform="translate(1100, 110)" filter="url(#softShadow)">
    <rect width="200" height="70" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">9. Supervisor</text>
    <text x="100" y="48" text-anchor="middle" font-size="10" fill="#92400e">escape hatch · rare</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" fill="#92400e">(retry exhaustion)</text>
  </g>

  <!-- ====== LEFT COLUMN (SQL path agents + Writer) ====== -->

  <g transform="translate(130, 285)" filter="url(#softShadow)">
    <rect width="200" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">2. Coder</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" fill="#64748b">writes SELECT SQL</text>
  </g>

  <g transform="translate(130, 405)" filter="url(#softShadow)">
    <rect width="200" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">3. Code Reviewer</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" fill="#64748b">technical correctness</text>
  </g>

  <g transform="translate(130, 525)" filter="url(#softShadow)">
    <rect width="200" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">4. Output Reviewer</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" fill="#64748b">semantic + viz feasibility</text>
  </g>

  <g transform="translate(130, 645)" filter="url(#softShadow)">
    <rect width="200" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">5. Writer</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" fill="#64748b">natural-language answer</text>
  </g>

  <!-- ====== RIGHT COLUMN (Viz pipeline) ====== -->

  <g transform="translate(1170, 285)" filter="url(#softShadow)">
    <rect width="220" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">6. Visualization Coder</text>
    <text x="110" y="50" text-anchor="middle" font-size="10" fill="#64748b">writes matplotlib code</text>
  </g>

  <g transform="translate(1170, 405)" filter="url(#softShadow)">
    <rect width="220" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">7. Viz Code Reviewer</text>
    <text x="110" y="50" text-anchor="middle" font-size="10" fill="#64748b">static review of code</text>
  </g>

  <g transform="translate(1170, 525)" filter="url(#softShadow)">
    <rect width="220" height="70" rx="12" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">8. Viz Reviewer</text>
    <text x="110" y="46" text-anchor="middle" font-size="10" font-weight="600" fill="#0e7490">MULTIMODAL · sees PNG</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#64748b">layout · legibility · fit</text>
  </g>

  <!-- ====== ORCHESTRATOR (center) ====== -->

  <g transform="translate(610, 440)" filter="url(#softShadow)">
    <rect width="280" height="120" rx="16" fill="#1f2937"/>
    <text x="140" y="44" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">ORCHESTRATOR</text>
    <text x="140" y="68" text-anchor="middle" fill="#cbd5e1" font-size="11">rule-based · no LLM</text>
    <text x="140" y="86" text-anchor="middle" fill="#cbd5e1" font-size="11">routes · retries · calls tools</text>
    <text x="140" y="104" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">only hub every agent talks to</text>
  </g>

  <!-- ====== TOOLS CLUSTER (bottom) ====== -->

  <g>
    <rect x="120" y="800" width="1260" height="200" rx="14"
          fill="#f6fef9" stroke="#16a34a" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="150" y="828" font-size="14" font-weight="700" fill="#14532d">Tools — only the Orchestrator calls these</text>

    <g transform="translate(160, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">sql_parser</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">extract &lt;sql_query&gt;</text>
    </g>
    <g transform="translate(340, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">sql_safety_guard</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">SELECT-only check</text>
    </g>
    <g transform="translate(520, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">sql_executor</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">runs query (MySQL)</text>
    </g>
    <g transform="translate(700, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">viz_code_parser</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">extract &lt;viz_code&gt;</text>
    </g>
    <g transform="translate(880, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">viz_generator</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">sandbox exec → PNG</text>
    </g>
    <g transform="translate(1060, 855)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">png_to_base64</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">(vestigial)</text>
    </g>

    <!-- Row 2 of tools — eval / persistence integrations -->
    <g transform="translate(160, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">to_excel</text>
      <text x="80" y="44" text-anchor="middle" font-size="9" fill="#166534">rows → .xlsx</text>
    </g>
    <g transform="translate(340, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">groundedness_check</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#166534">verify Writer numbers</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#7c2d12">HARD BLOCK · max 2</text>
    </g>
    <g transform="translate(520, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">safe_derivations_</text>
      <text x="80" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">summary</text>
      <text x="80" y="46" text-anchor="middle" font-size="9" fill="#166534">pre-compute Writer's</text>
      <text x="80" y="56" text-anchor="middle" font-size="9" fill="#166534">safe values list</text>
    </g>
    <g transform="translate(700, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">SCHEMA_TEXT</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#166534">schema for Coder /</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#166534">Code Reviewer prompts</text>
    </g>
    <g transform="translate(880, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">log_turn</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#166534">persist turn →</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#166534">chat_trace MySQL</text>
    </g>
    <g transform="translate(1060, 925)">
      <rect width="160" height="60" rx="10" fill="#d1fadf" stroke="#16a34a" stroke-width="1.6"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">render_in_chat</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#166534">Streamlit display</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#166534">(st.image / st.markdown)</text>
    </g>
  </g>

  <!-- chat_trace MySQL destination node — explicit persistence target -->
  <line x1="960" y1="985" x2="960" y2="1075" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 4"/>
  <g transform="translate(870, 1080)">
    <rect width="180" height="56" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
    <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">chat_trace</text>
    <text x="90" y="38" text-anchor="middle" font-size="10" fill="#713f12">MySQL audit table</text>
    <text x="90" y="50" text-anchor="middle" font-size="9" fill="#92400e">one row per turn</text>
  </g>

  <!-- ================================================================
       Offline components cluster — runs on a separate cadence,
       not during a chat turn. Topic Classifier (data-prep enrichment)
       + the four eval scripts + the manual eval prompts file.
       ================================================================ -->
  <g>
    <rect x="120" y="1180" width="1260" height="240" rx="14"
          fill="#fdf4ff" stroke="#a21caf" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="150" y="1208" font-size="14" font-weight="700" fill="#581c87">Offline components — separate cadence, not per-turn</text>
    <text x="150" y="1226" font-size="10" fill="#86198f">Topic enrichment runs once at ingestion. Eval scripts run on a release / change cadence; manual eval is human-driven.</text>

    <!-- Topic Classifier — offline LLM agent in data_prep -->
    <g transform="translate(160, 1245)">
      <rect width="220" height="80" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">Topic Classifier (offline)</text>
      <text x="110" y="38" text-anchor="middle" font-size="9" fill="#86198f">data_prep/02_enrich_topics.py</text>
      <text x="110" y="52" text-anchor="middle" font-size="9" fill="#86198f">Haiku 4.5 · one call per row</text>
      <text x="110" y="68" text-anchor="middle" font-size="9" fill="#86198f">populates 4 enrichment cols</text>
    </g>

    <!-- 03_eval_topic_classifier — accuracy eval against ground_truth -->
    <g transform="translate(400, 1245)">
      <rect width="200" height="80" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">03_eval_topic_classifier</text>
      <text x="100" y="38" text-anchor="middle" font-size="9" fill="#86198f">accuracy + F1 +</text>
      <text x="100" y="52" text-anchor="middle" font-size="9" fill="#86198f">confusion matrix</text>
      <text x="100" y="68" text-anchor="middle" font-size="9" fill="#86198f">(inferred vs ground_truth)</text>
    </g>

    <!-- test_golden_sql + dataset — CI shape check -->
    <g transform="translate(620, 1245)">
      <rect width="200" height="80" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">test_golden_sql</text>
      <text x="100" y="38" text-anchor="middle" font-size="9" fill="#86198f">+ golden_sql_dataset.jsonl</text>
      <text x="100" y="52" text-anchor="middle" font-size="9" fill="#86198f">25-entry regression suite</text>
      <text x="100" y="68" text-anchor="middle" font-size="9" fill="#86198f">SHAPE check (CI-style)</text>
    </g>

    <!-- verify_evals — integration smoke -->
    <g transform="translate(840, 1245)">
      <rect width="200" height="80" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">verify_evals</text>
      <text x="100" y="38" text-anchor="middle" font-size="9" fill="#86198f">7-check integration smoke</text>
      <text x="100" y="52" text-anchor="middle" font-size="9" fill="#86198f">(groundedness behaviors +</text>
      <text x="100" y="68" text-anchor="middle" font-size="9" fill="#86198f">trace_logger round-trip)</text>
    </g>

    <!-- eval_prompts.md — manual ground-truth -->
    <g transform="translate(1060, 1245)">
      <rect width="200" height="80" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">eval_prompts.md</text>
      <text x="100" y="38" text-anchor="middle" font-size="9" fill="#86198f">15 manual prompts</text>
      <text x="100" y="52" text-anchor="middle" font-size="9" fill="#86198f">3 difficulty tiers</text>
      <text x="100" y="68" text-anchor="middle" font-size="9" fill="#86198f">ANSWER correctness check</text>
    </g>

    <!-- Smoke-test runners for the chat pipeline -->
    <g transform="translate(400, 1340)">
      <rect width="420" height="50" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="1.6"/>
      <text x="210" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">test_planner · test_orchestrator</text>
      <text x="210" y="38" text-anchor="middle" font-size="9" fill="#86198f">eyeball-mode runners (Planner standalone + full end-to-end)</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(36, 1040)">
    <rect width="120" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#0f172a">Edges</text>
    <line x1="14" y1="38" x2="56" y2="38" stroke="#475569" stroke-width="2"/>
    <text x="64" y="42" font-size="10" fill="#1f2937">LLM agent</text>
    <line x1="14" y1="58" x2="56" y2="58" stroke="#d97706" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="64" y="62" font-size="10" fill="#1f2937">Supervisor</text>
    <line x1="14" y1="78" x2="56" y2="78" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="64" y="82" font-size="10" fill="#1f2937">Tool</text>
    <text x="14" y="100" font-size="9" fill="#64748b" font-style="italic">No agent-to-agent</text>
  </g>

</svg>
